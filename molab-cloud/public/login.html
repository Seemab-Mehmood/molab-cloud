<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Login — MOLAB Cloud</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="brand-mark"></div><div><h1 class="font-display">MOLAB <span class="pill ok" style="padding:2px 6px;">CLOUD</span></h1></div></div>
</div>
<div class="container-sm">
  <a href="/" class="font-mono notice-text" style="text-decoration:none;">← Back</a>
  <div class="card pad" style="margin-top:16px;">
    <h2 class="font-display" style="margin-top:0;">Hospital representative login</h2>
    <form id="loginForm">
      <label class="label-sm">Representative email</label><input class="input" id="email" type="email" required>
      <div style="height:10px;"></div>
      <label class="label-sm">Password</label><input class="input" id="password" type="password" required>
      <div id="err" class="error-text hidden" style="margin:10px 0 0;"></div>
      <div id="resendBox" class="hidden" style="margin-top:10px;">
        <button type="button" class="btn btn-ghost" id="resendBtn" style="width:100%;">Resend verification email</button>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:14px;">Log In</button>
    </form>
    <p class="notice-text" style="text-align:center; margin-top:14px;">No account yet? <a href="/signup.html" style="color:var(--accent);">Register your hospital</a></p>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('err'); errEl.classList.add('hidden');
  document.getElementById('resendBox').classList.add('hidden');
  try {
    await API.post('/api/auth/login', {
      repEmail: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    });
    location.href = '/dashboard.html';
  } catch (err) {
    errEl.innerText = err.message; errEl.classList.remove('hidden');
    if (err.code === 'EMAIL_NOT_VERIFIED') document.getElementById('resendBox').classList.remove('hidden');
  }
});
document.getElementById('resendBtn').addEventListener('click', async () => {
  try {
    const r = await API.post('/api/auth/resend-verification', { repEmail: document.getElementById('email').value.trim() });
    alert(r.message);
  } catch (e) { alert(e.message); }
});
</script>
</body>
</html>
